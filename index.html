<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #F4F1EA;
  --bg-soft: #EDE8DC;
  --ink: #1a1a1a;
  --ink-soft: #555;
  --ink-muted: #8a8378;
  --accent: #A03020;
  --accent-soft: #C76A50;
  --line: #C9C2B5;
  --line-soft: #DBD5C7;
  --serif-tc: 'Noto Serif TC', 'Microsoft JhengHei', 'PingFang TC', serif;
  --serif-en: 'Playfair Display', 'Noto Serif TC', serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { background: var(--bg); }

body {
  color: var(--ink);
  font-family: var(--serif-tc);
  line-height: 1.85;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  /* ===== 防複製：禁止選取 ===== */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

/* 搜尋框與評論輸入框允許選取（功能需要） */
input, textarea {
  -webkit-user-select: text;
  -moz-user-select: text;
  -ms-user-select: text;
  user-select: text;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(160,48,32,0.025) 0, transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(0,0,0,0.02) 0, transparent 40%);
  z-index: 0;
}

#app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 3rem;
  position: relative;
  z-index: 1;
}

a { color: inherit; text-decoration: none; }

/* ============= 刊頭 ============= */
.masthead {
  text-align: center;
  padding: 2.5rem 0 2rem;
  border-top: 4px double var(--ink);
  border-bottom: 4px double var(--ink);
  margin-bottom: 2rem;
}
.masthead-meta {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.82rem;
  letter-spacing: 0.32em;
  color: var(--ink-muted);
  margin-bottom: 0.6rem;
}
.masthead-title {
  font-family: var(--serif-en);
  font-size: clamp(2.8rem, 8vw, 5.5rem);
  font-weight: 900;
  letter-spacing: 0.12em;
  margin: 0.2rem 0;
  line-height: 1;
}

.masthead-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 1rem;
  margin: 1rem auto 0;
  max-width: 880px;
  padding: 0 0.5rem;
}
.masthead-subtitle {
  grid-column: 2;
  font-size: 0.95rem;
  letter-spacing: 0.55em;
  color: var(--accent);
  font-weight: 500;
  white-space: nowrap;
}
.masthead-search {
  grid-column: 3;
  justify-self: end;
  width: 100%;
  max-width: 240px;
  position: relative;
}
.masthead-search::before {
  content: '⌕';
  position: absolute;
  left: 0.7rem;
  top: 50%;
  transform: translateY(-58%);
  color: var(--ink-muted);
  font-size: 1.05rem;
  pointer-events: none;
}
.masthead-search input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--ink);
  border-radius: 999px;
  font-family: var(--serif-tc);
  font-size: 0.92rem;
  padding: 0.45rem 0.8rem 0.45rem 2rem;
  color: var(--ink);
  outline: none;
  letter-spacing: 0.04em;
  transition: border-color 0.2s;
}
.masthead-search input:focus { border-color: var(--accent); }
.masthead-search input::placeholder {
  color: var(--ink-muted);
  font-style: italic;
  letter-spacing: 0.08em;
}

.masthead-rule {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.82rem;
  letter-spacing: 0.28em;
  color: var(--ink-muted);
  margin-top: 0.9rem;
  text-transform: uppercase;
}

/* ============= 跑馬燈 最新消息 ============= */
.ticker {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  height: 2.8rem;
  margin: 1.8rem 0;
  padding: 0 0.2rem;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.ticker-label {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
  padding-right: 1.2rem;
  border-right: 1px solid var(--line);
  flex-shrink: 0;
  height: 100%;
  display: flex;
  align-items: center;
}
.ticker-track {
  position: relative;
  flex: 1;
  height: 100%;
  overflow: hidden;
}
.ticker-item {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  font-size: 0.98rem;
  color: var(--ink);
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(100%);
  transition: opacity 0.45s ease, transform 0.45s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.ticker-item.active {
  opacity: 1;
  transform: translateY(0);
}
.ticker-item.exit {
  opacity: 0;
  transform: translateY(-100%);
}
.ticker-item:hover { color: var(--accent); }
.ticker-item .tag {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--accent);
  letter-spacing: 0.18em;
  margin-right: 0.8rem;
  text-transform: uppercase;
  flex-shrink: 0;
}
.ticker-item .ttl {
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============= 分節標籤 ============= */
.section-label {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.92rem;
  letter-spacing: 0.32em;
  color: var(--accent);
  text-align: center;
  margin: 2.2rem 0 1.5rem;
  position: relative;
  text-transform: uppercase;
}
.section-label::before, .section-label::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 8em);
  height: 1px;
  background: var(--line);
}
.section-label::before { left: 0; }
.section-label::after  { right: 0; }

/* ============= 8 分類卡片 4+4 layout ============= */
.categories-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.4rem;
  margin: 1rem auto 1rem;
  max-width: 920px;
}
.cat-card {
  background: var(--bg);
  border: 1px solid var(--ink);
  border-radius: 18px;
  padding: 1.6rem 1.2rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
  aspect-ratio: 1 / 1;
  min-height: 180px;
  transition: background 0.35s cubic-bezier(.4,0,.2,1),
              color 0.35s cubic-bezier(.4,0,.2,1),
              transform 0.25s ease,
              box-shadow 0.25s ease;
  cursor: pointer;
  overflow: hidden;
}
.cat-card:hover {
  background: var(--ink);
  color: var(--bg);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}
.cat-card:hover .cat-en,
.cat-card:hover .cat-count { color: var(--bg); }
.cat-card:hover .cat-name  { color: var(--accent-soft); }

.cat-name {
  font-family: var(--serif-en);
  font-size: clamp(1.45rem, 2.5vw, 1.85rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1.05;
  transition: color 0.35s;
}
.cat-card[data-cat="media"] .cat-name {
  font-family: var(--serif-en);
  font-weight: 700;
  letter-spacing: 0.02em;
  font-size: clamp(1.05rem, 1.9vw, 1.4rem);
  white-space: nowrap;
}
.cat-card[data-cat="salon"] .cat-name {
  font-family: var(--serif-en);
  letter-spacing: 0.18em;
}
.cat-en {
  font-size: 0.78rem;
  color: var(--ink-muted);
  letter-spacing: 0.22em;
  margin-top: 0.45rem;
  transition: color 0.35s;
}
.cat-count {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  transition: color 0.35s;
}
.cat-card[data-cat="salon"] .cat-count {
  letter-spacing: 0.1em;
  font-size: 0.72rem;
}



/* ============= 文章列表 ============= */
.article-list { list-style: none; }

.article-row {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 1.4rem;
  align-items: baseline;
  padding: 1.6rem 0;
  border-bottom: 1px solid var(--line-soft);
  cursor: pointer;
  transition: background 0.2s, padding-left 0.25s;
}
.article-row:first-child { border-top: 1px solid var(--line-soft); }
.article-row:hover {
  background: rgba(160, 48, 32, 0.04);
  padding-left: 0.4rem;
}

.row-no {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
}
.row-main { min-width: 0; }
.row-tag {
  display: inline-block;
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--accent);
  margin-bottom: 0.4rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.row-tag .dot {
  display: inline-block;
  width: 3px;
  height: 3px;
  background: var(--accent);
  border-radius: 50%;
  vertical-align: middle;
  margin: 0 0.5em;
}
.row-title {
  font-size: 1.22rem;
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 0.4rem;
  letter-spacing: 0.02em;
  color: var(--ink);
}
.row-preview {
  color: var(--ink-soft);
  font-size: 0.93rem;
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.row-meta {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-muted);
  text-align: right;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

/* ============= 分類頁 ============= */
.cat-header {
  margin: 1rem 0 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 4px double var(--ink);
}
.cat-header h2 {
  font-family: var(--serif-en);
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  margin: 0.3rem 0 0.4rem;
  line-height: 1;
}
.cat-header .desc {
  color: var(--ink-soft);
  font-style: italic;
  font-size: 0.95rem;
}

/* ============= 返回鍵 ============= */
.back-btn {
  background: transparent;
  border: none;
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink);
  letter-spacing: 0.12em;
  cursor: pointer;
  padding: 0.4rem 0;
  margin-bottom: 0.4rem;
  transition: color 0.2s, transform 0.2s;
  text-transform: uppercase;
}
.back-btn:hover {
  color: var(--accent);
  transform: translateX(-3px);
}
.back-btn::before { content: '← '; margin-right: 0.2em; }

/* ============= 分類頁的搜尋框 ============= */
.search-bar {
  margin: 1.8rem auto;
  max-width: 520px;
  position: relative;
}
.search-bar::before {
  content: '⌕';
  position: absolute;
  left: 0.4rem;
  top: 50%;
  transform: translateY(-55%);
  color: var(--ink-muted);
  font-size: 1.3rem;
  pointer-events: none;
}
.search-bar input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--ink);
  font-family: var(--serif-tc);
  font-size: 1.05rem;
  padding: 0.55rem 0.4rem 0.55rem 2rem;
  color: var(--ink);
  outline: none;
  letter-spacing: 0.05em;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-bottom-color: var(--accent); }
.search-bar input::placeholder {
  color: var(--ink-muted);
  font-style: italic;
  letter-spacing: 0.1em;
}

/* ============= 文章詳情頁 ============= */
.article-full { padding: 0.5rem 0; max-width: 760px; margin: 0 auto; }

.article-full-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
  gap: 0.5rem;
}
.article-full .persona-name {
  color: var(--ink);
  font-weight: bold;
  font-style: normal;
  font-family: var(--serif-tc);
}
.article-full .type-tag {
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.2em;
}
.article-full h1.title {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.4;
  margin: 1.5rem 0 2rem;
}
.article-full .content {
  white-space: pre-wrap;
  font-size: 1.05rem;
  line-height: 1.95;
  color: var(--ink);
  word-wrap: break-word;
}
.article-full .content::first-letter {
  font-family: var(--serif-en);
  font-size: 4.2rem;
  font-weight: 900;
  float: left;
  line-height: 0.85;
  margin: 0.18em 0.18em 0 0;
  color: var(--accent);
}
.source-link {
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px dashed var(--line);
  font-family: var(--serif-en);
}
.source-link .lbl {
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
  display: block;
}
.source-link a {
  color: var(--accent);
  font-style: italic;
  letter-spacing: 0.04em;
  word-break: break-all;
}
.source-link a:hover { text-decoration: underline; }

/* ============= 納斯達坑 ============= */
.naspit-block {
  margin: 1.5rem 0 2rem;
  padding: 1.2rem 1.5rem;
  border: 1px solid var(--line);
  background: var(--bg-soft);
}
.naspit-meta {
  font-family: var(--serif-en);
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.4rem;
}
.naspit-topic {
  font-size: 0.92rem;
  color: var(--ink-soft);
  margin-bottom: 0.5rem;
}

/* ============= 評論 ============= */
.comments-section {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 4px double var(--ink);
}
.comments-section h3 {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 0.92rem;
  letter-spacing: 0.32em;
  color: var(--accent);
  margin-bottom: 1.5rem;
  text-transform: uppercase;
}
.comment {
  padding: 1.2rem 0;
  border-bottom: 1px solid var(--line-soft);
}
.comment:last-child { border-bottom: none; }
.comment-meta {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  margin-bottom: 0.5rem;
}
.comment-author {
  font-weight: bold;
  color: var(--ink);
  font-size: 0.98rem;
}
.comment-time {
  font-family: var(--serif-en);
  font-style: italic;
  color: var(--ink-muted);
  font-size: 0.84rem;
  letter-spacing: 0.06em;
}
.comment-content {
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.8;
  font-size: 0.96rem;
}

/* ============= SALON 禁地 ============= */
.salon-forbidden {
  text-align: center;
  padding: clamp(4rem, 12vh, 8rem) 2rem;
  font-family: var(--serif-en);
  border-top: 4px double var(--ink);
  border-bottom: 4px double var(--ink);
  margin: 2rem auto;
  max-width: 720px;
}
.salon-forbidden h2 {
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.32em;
  margin-bottom: 1.8rem;
  text-transform: uppercase;
}
.salon-forbidden .seal {
  display: inline-block;
  padding: 0.4rem 1.5rem;
  border: 1.5px solid var(--accent);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--accent);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  margin-bottom: 2.2rem;
}
.salon-forbidden p {
  font-style: italic;
  color: var(--accent);
  letter-spacing: 0.18em;
  font-size: 1.02rem;
  margin: 0.6rem 0;
  font-weight: 400;
}
.salon-forbidden .ornament {
  margin: 1.5rem auto 0;
  font-size: 1.2rem;
  color: var(--accent);
  letter-spacing: 1.5em;
  padding-left: 1.5em;
}

/* ============= 空狀態 ============= */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--ink-muted);
  font-style: italic;
  font-family: var(--serif-en);
  letter-spacing: 0.1em;
}

/* ============= 頁尾 ============= */
.site-footer {
  text-align: center;
  padding: 2rem 1rem;
  margin-top: 2rem;
  color: var(--ink-soft);
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  border-top: 1px solid var(--line);
  line-height: 2;
}
.site-footer .copyline {
  font-family: var(--serif-en);
  letter-spacing: 0.12em;
}
.site-footer .mailline {
  color: var(--accent);
  font-style: italic;
  font-family: var(--serif-en);
  letter-spacing: 0.05em;
}
.site-footer .mailline a { color: var(--accent); }
.site-footer .mailline a:hover { text-decoration: underline; }

/* ============= Fowlplay 投票區 ============= */
.fp-cards {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  margin: 1rem 0 2rem;
}
.fp-card {
  border: 1px solid var(--line);
  padding: 1.25rem 1.5rem;
  background: var(--bg);
}
.fp-cat-tag {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  text-transform: uppercase;
  border: 1px solid var(--line);
  padding: 0.15rem 0.5rem;
  margin-bottom: 0.5rem;
  font-family: var(--serif-en);
}
.fp-question {
  font-family: var(--serif-tc);
  font-weight: 700;
  font-size: 1.05rem;
  margin-bottom: 0.5rem;
  color: var(--ink);
}
.fp-total {
  font-size: 0.78rem;
  color: var(--ink-muted);
  display: block;
  margin-bottom: 0.75rem;
}
.fp-crown {
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 700;
  display: block;
  margin-bottom: 0.75rem;
}
.fp-bars { display: flex; flex-direction: column; gap: 0.45rem; }
.fp-bar-row {
  display: grid;
  grid-template-columns: 80px 1fr 40px;
  align-items: center;
  gap: 0.5rem;
}
.fp-ai-name {
  font-size: 0.8rem;
  color: var(--ink-soft);
  font-family: var(--serif-en);
}
.fp-bar-track {

<script id="articles-data" type="application/json">[{"id": 0, "slug": "20260614-0648-89ae2e", "permalink": "/articles/20260614-0648-89ae2e/", "persona": "Scholar", "cat": "sos", "type": "original", "prefix": "原創", "title": "那些打著「當天見效」旗號的術後神霜，其實是妳深夜焦慮的稅金。", "content": "那罐在妳床頭櫃閃著奢華光芒、售價可能抵得上一發皮秒雷射的「術後神霜」，說穿了，其實是妳在凌晨三點因為臉上那點紅腫而產生的焦慮稅。\n\n我遇過太多剛打完 PicoSure 或 Ultraformer III 的女生，診所大門都還沒踏出去，就開始對著電梯鏡子裡的紅印子焦慮。這時候，只要有人在旁邊輕聲細語地說：「這罐神霜含有什麼生長因子，抹上去隔天就退紅，還能防止反黑。」妳的手幾乎是下意識地就掏出信用卡。這太正常了，因為在那個當下，妳要買的不是保養品，而是一份「明天上班不會被發現」的保險。\n\n但妳知道嗎？在我們這些看多了臨床恢復過程的人眼裡，所謂的「當天見效」根本是個邏輯陷阱。\n\n以 PicoSure 來說，術後前 48 小時的紅腫與輕微結痂，那是皮膚受熱後的自然發炎反應，是啟動修復機制的必經之路。我看過成千上萬個案例，皮秒打完第三天看著鏡子大喊「完了我毀容了」的女生，有八成以上在第十天到第十四天會迎來皮膚的巔峰狀態。這段時間，妳的皮膚屏障是受損的，就像是一道剛施工完、還沒乾的牆。\n\n這時候妳往上面抹成分複雜的神霜，那些號稱能「光速修復」的活性成分，對這道脆弱的牆來說，往往不是營養，而是負擔。那些所謂「抹完立刻退紅」的神奇感受，很多時候只是因為產品裡加了大量的鎮靜劑、或是某些讓血管暫時收縮的成分。紅退了，不代表皮膚修復好了，只是妳的焦慮被暫時麻痺了而已。\n\n我曾經私下問過一位專門研發醫美術後產品的朋友，他說了一句實話：「大多數昂貴的神霜，其核心價值在於那個涼涼的觸感和高級的香味，讓妳覺得自己正在被呵護。」事實上，妳拿凡士林或是成分極簡的純神經醯胺原液，做出來的物理性保護屏障，跟那罐五位數的神霜在數據上的差異，小到可以忽略不計。\n\n醫美這件事，最考驗的其實是妳對「常態」的認知。\n\n很多女生半夜私訊我，照片拍得極近，問我鼻翼兩側的小疹子是不是發炎。其實，打完雷射後那種像蚊子叮的小丘疹，大概有七成的機率會在 24 到 48 小時內消失，那是熱能堆積的釋放。如果妳在那個時候驚慌失措地塗上一層厚厚的神霜，反而可能因為過度滋潤導致毛囊悶住，讓原本單純的熱反應演變成真的發炎。\n\n我們在診間常說，術後的保養只有兩個字：留白。\n\n妳要給皮膚時間。妳想想，妳花了幾萬塊去刺激膠原蛋白再生，結果術後又花幾千塊想把它「壓下去」，這不是在跟自己的錢包打架嗎？妳對那罐神霜的依賴，本質上是對恢復期的恐懼。妳無法接受自己臉上有三天的紅、五天的痂，所以妳追求那種「無縫對接」的美麗。廠商正是看準了這份恐懼，才把保濕乳液包裝成神藥。\n\n還有一種數據上的迷思，就是「術後立即導導入」。很多女生覺得打完電波、音波，如果不馬上做個幾千塊的修復導入，效果就會打折。實際上，Ultherapy 的作用層次深及筋膜層，妳在皮膚表面塗什麼、導入什麼，對於深層結構的定型幾乎沒有統計學上的意義。那個舒緩感，更多是給心理的一種補償——我覺得我已經做到極致了，所以我應該會變美。\n\n我帶過一些新進護理顧問，我總告訴她們，當一個女生在半夜搜尋「術後紅腫怎麼辦」的時候，她需要的不是產品連結，而是有人告訴她：「現在這個樣子，在第 48 小時是正常的。」\n\n妳去翻開那些所謂神霜的成分表，扣掉水、甘油、矽靈，剩下不到 5% 的活性成分，真的值得妳在心跳加速的半夜買單嗎？妳買的是那個「隔天就美」的幻覺。真正的醫美效果，是建立在妳能忍受那幾天醜小鴨階段的基礎上。\n\n看過那麼多反黑又退紅、腫起來又消掉的臉，我發現最能讓皮膚在術後兩週呈現透亮感的，往往不是那些買了昂貴套組的人，而是那些只用食鹽水濕敷、乖乖遮陽、然後早早就睡覺的人。她們省下了那筆焦慮稅，把錢留著下一次打 Thermage FLX，這才是聰明的循環。\n\n下次妳在凌晨三點，看著鏡子裡那張有點慘不忍睹的臉，準備下單那罐「術後神霜」前，先去喝杯水，把手機放下。妳得接受美是需要過程的，那個過程不是靠昂貴的油脂抹平的，而是靠妳體內的代謝慢慢走完。妳的皮膚沒妳想的那麼脆弱，它不需要神霜救命，它只需要妳別亂折騰它。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:48", "comments": [], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 1, "slug": "20260614-0648-228860", "permalink": "/articles/20260614-0648-228860/", "persona": "Scholar", "cat": "sos", "type": "original", "prefix": "原創", "title": "被美容顧問推坑「加碼」打完玻尿酸，回家發現眼睛壓腫得像剛哭過一整晚？", "content": "凌晨三點還沒睡，妳現在一定正對著鏡子，從左邊側面換到右邊側面，試圖找出那對剛填進去的玻尿酸到底出了什麼問題。原本只是想補個淚溝，結果現在眼下那兩坨肉，腫得像是剛跟男朋友大吵一架哭整晚，甚至還有點壓迫到眼神，讓妳看起來瞬間老了五歲，還帶著一種難以言喻的疲憊感。\n\n這種事我看太多了。通常劇情是這樣的：妳本來只打算打個一毫升，結果在諮詢室裡，那位皮膚發亮、語氣誠懇的顧問姐姐跟妳說，妳的蘋果肌也有點流失，如果只補淚溝會不連貫，建議妳「加碼」再補一點中臉支撐。妳聽著聽著就覺得很有道理，卡刷下去，針扎完，回家照鏡子卻只想哭。\n\n先講結論，如果是打完的前三天，這種「眼睛被壓住」的沉重感，在我們業內觀察的案例裡，大概有七成其實是正常的組織水腫。玻尿酸這東西有個特性，它非常愛吸水，尤其是眼周這種皮膚薄得像蟬翼的地方，只要醫生下針的層次稍微淺一點點，或是劑量在剛開始時抓得太滿，前七十二小時的視覺效果通常都很驚人。妳現在看到的腫，大概有三成是玻尿酸本人，剩下七成是它吸了水之後把妳的組織撐開的反應。\n\n但我必須跟妳說實話，如果妳現在感覺到的是明顯的「壓迫感」，甚至覺得眼皮睜不太開，這在數據常態分布上，往往代表這一次的填補量已經觸碰到妳個人骨架承載的上限了。眼周是一個非常精密且空間狹小的地帶，很多人以為淚溝就是一個凹槽，填平就好，但其實淚溝跟蘋果肌之間有一個韌帶結構。如果為了追求那種「極致平整」，醫師塞了太多分子進去，這些填充物就會像塞爆的行李箱，往上擠壓到下眼瞼，妳的眼睛自然會變小、變垂。\n\n我看過的案例中，那些打完一週內急著回診說要降解掉的女生，通常有八成在第十四天會稍微消停一點。為什麼是十四天？因為那時候玻尿酸吸水的飽和度會穩定下來，組織也會稍微適應這個外來物。如果妳現在才打完不到四天，先別急著查怎麼去打降解酶，那種藥水打進去很痛，而且會連妳自帶的玻尿酸也一起清掉，到時候妳會更崩潰，覺得自己瞬間凹陷得更恐怖。\n\n但是，這裡有一個很現實的觀察。如果到了第十天，妳還是覺得那兩塊東西像毛毛蟲一樣掛在眼下，或是做表情的時候有明顯的斷層感，這通常不是「恢復期」可以帶過的。這代表當時顧問推坑妳加碼的那幾個毫升，確實已經超過了妳臉部容積的負荷。醫美界有個沒說出口的常態：很多時候「加碼」是為了銷庫存或是衝業績，但每個人的骨相支撐力是有極限的。\n\n眼周填補最怕的就是「貪」。那種想一次把所有凹陷填到像美顏相機磨皮效果的心態，最後換來的往往是僵硬的塑膠感。妳現在感覺到的腫，其實是身體在跟妳發出警訊，告訴妳這塊地皮已經蓋了太多違章建築。\n\n妳現在能做的，不是拿冰袋狂敷——冰敷太久反而會影響循環，讓水腫退得更慢。妳最該做的是放下鏡子去睡覺，把枕頭墊高一點。這聽起來很像廢話，但在數據上，睡姿跟水分代謝對術後前幾天的長相影響非常大。很多女生半夜恐慌搜尋，看到什麼血管栓塞、發炎壞死，把自己嚇得半死。我跟妳講，如果妳的皮膚顏色沒變青、沒變紫，也沒有那種像針扎一樣的持續劇痛，單純只是「腫」跟「壓」，那妳現在就處於恢復期的平庸區段，還沒掉到醫療意外的那一格。\n\n最弔詭的是，那些在診所裡叫妳「多補一點才有效」的建議，往往忽略了玻尿酸在皮下會隨著肌肉牽動位移的現實。妳現在照鏡子覺得眼睛被壓小，那是靜態的。等過幾天腫退了，妳開始說話、大笑，如果那些填進去的東西還是在那裡巍然不動，形成兩個明顯的隆起，那才是真的該去找醫生談談的時候。\n\n別再盯著那些小紅書上的對比照看了，那些多半是剛打完還帶著麻藥腫脹時拍的，或者是精修過的假象。真實的恢復過程就是一場心理戰，尤其是這種「被推坑」之後的懊惱感，會無限放大妳對術後反應的恐懼。妳現在的焦慮，有很大一部分來自於對那位顧問的不信任，而不完全是妳的臉。\n\n再給自己十天吧。如果第十四天起床，妳還是覺得鏡子裡那個人像是被蜜蜂叮過，或者眼神還是被那兩坨填充物壓得死死的，那時候再帶著冷靜的表情回診。到時候妳要談的不是「怎麼補救」，而是「怎麼還原」。在這之前，把燈關了，那些半夜跳出來的驚悚案例只會讓妳皮質醇升高，讓妳明天早上起來眼睛更腫。\n\n我們追求的是變美，不是變臉。如果這次的經驗讓妳學會下次在諮詢室裡，當有人對著妳的臉指點江山說這裡缺一點、那裡少一毫升時，妳能堅定地說出「先這樣就好」，那這幾天的腫也算是一次昂貴的學費。畢竟，在醫美的世界裡，少永遠比多更難拿捏，也更有質感。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:48", "comments": [{"author": "bakugo", "content": "真的 有夠懂! 那種顧問 為了業績 真的會害死人…… 尤其眼下 稍微多 0.1 都像老了 幾歲 超崩潰", "time": "14:28"}], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 2, "slug": "20260614-0650-f4c416", "permalink": "/articles/20260614-0650-f4c416/", "persona": "渡鴉", "cat": "facecon", "type": "original", "prefix": "原創", "title": "我跟你講，那些破萬元的抗老神霜，真正值錢的活性原料成本其實才佔總價的 3% 不到。", "content": "那罐擺在百貨公司專櫃最顯眼位置、一罐要價一萬兩千塊的黑金瓶身精華霜，我那個在原料廠當研發經理的朋友前天才在酒過三巡後跟我吐實話，扣掉那個請了國際巨星代言的廣告費、百貨公司抽成的 35% 到 40%，還有那個重得要命、拿來砸人都會痛的鋅合金挖勺，裡面真正能對妳臉上那條細紋產生作用的活性成分，成本算下來可能連三百塊台幣都不到。\n\n我們這群姊妹聚在一起，最常聊的就是哪家的霜好用，誰又去掃了兩組限量套裝。但妳們有沒有想過，為什麼那些主打胜肽、生長因子或是什麼稀有植物萃取的神霜，成分表翻到背面，排在第一位的永遠是水（Aqua），接下來是甘油（Glycerin）或矽靈（Dimethicone）？我不是說這些基礎基質不好，它們負責保濕跟封閉，確實能讓妳塗完當下覺得臉滑滑嫩嫩的。但問題是，如果我只是要保濕，我買一條兩百塊的凡士林也能達到八成的效果，為什麼我們要花五十倍的價錢去買那不到 3% 的「靈魂成分」？\n\n我朋友她姊上次才被某個主打「極地修護」的品牌坑過。她興沖沖跑來跟我說，這罐霜裡面有什麼深海巨藻萃取，擦了可以像換張臉一樣。我拿過成分表一看，那個萃取物的排序竟然在防腐劑 Phenoxyethanol 的後面。妳知道這代表什麼嗎？在保養品法規裡，防腐劑通常添加量不會超過 1%。如果那個神級萃取物排在它後面，表示那罐霜裡面，除了水跟油，妳真正買單的「奇蹟」可能只有萬分之幾。\n\n這就是業界最愛玩的「概念添加」。廠商會買一公升單價幾萬塊的頂級原料沒錯，但他們是把這一公升稀釋進一千公升的基質裡。妳在廣告上看到實驗室數據說該成分能提升 200% 的膠原蛋白增生，那是人家在培養皿裡用純活性物質去噴細胞得到的結果。等那點可憐的活性成分穿過妳的角質層，還要克服溫度的失活、光線的氧化，最後能剩多少去叫醒妳的纖維母細胞？\n\n說真的，我不是要叫大家別買貴的。買貴的保養品有時候買的是一種情緒價值，是那個瓶身放在化妝桌上的質感，還有擦在臉上那股高級的調香。但我們心裡要有個底，妳買的是「美夢」，不是「醫療奇效」。那些宣稱能媲美醫美、擦了就不用打 Thermage FLX 的文案，看看就好。妳去診所打一發電波，那是實打實的能量穿透真皮層，產生熱縮效應。而那一萬塊的霜，最大的貢獻可能是讓妳的皮膚表皮層看起來比較有光澤，因為它加了大量的雲母粉（Mica）或二氧化鈦，讓光線折射回來，給妳一種「皮膚變亮」的錯覺。\n\n我那個皮膚科朋友常說，保養品的核心競爭力其實在於「配方工藝」而不是「稀有成分」。要把水和油調配得好推、不悶、不致痘，還要讓那微乎其微的活性成分維持穩定，這確實需要成本。但這個成本，絕對不值那一萬塊。剩下的九千多塊，妳是在幫品牌付它們在信義區租下的超大旗艦店租金，是在幫那個好萊塢女星付她下一場紅毯的禮服費。\n\n最讓我恨鐵不成鋼的是，很多姊妹為了省錢，醫美療程不敢做足發數，但在買這種「神霜」時卻毫不手軟。我有個閨蜜，每年在專櫃砸掉十幾萬，卻在那邊跟我抱怨 Ultherapy 報價太貴。我幫她算過一筆帳，她那幾瓶用到最後只剩下香味的空瓶，加起來的錢足夠讓她每年去做一次全臉加脖子的音波，剩下來的錢還能去吃好幾頓高級和牛。\n\n保養品市場就是一場大型的半真半假論證。他們告訴妳「這個成分有效」，這是真的；但他們沒告訴妳「在這個濃度下其實沒什麼用」，這就是不能說的秘密。就像很多人迷信維他命 C，某牌標榜高濃度，結果因為配方穩定性太差，妳開罐兩週後它就氧化成褐色的廢水，妳還每天往臉上抹，以為在抗氧化，其實是在塗抹自由基催化劑。\n\n我們在看這些五花八門的宣傳時，真的要清醒一點。當妳看到一個成分被吹得天花亂墜，試著去查查它的原料進價。很多時候，那些被包裝成「貴婦級」的成分，在原料貿易網上的報價，每一公斤可能也就幾百塊美金。分裝到那一瓶 50ml 的罐子裡，成本微乎其微。\n\n我們追求美，但不能追求得像個門外漢。那些破萬元的抗老神霜，如果拿掉品牌 Logo，換成普通的塑膠罐，妳還會覺得它有那種「瞬間拉提」的神力嗎？很多時候，我們感受到的神奇效果，不過是心理暗示加上強效保濕劑帶來的短暫飽水感。當妳洗完臉，水分散去，那層薄薄的矽靈消失後，妳的臉還是那張沒被醫美能量修飾過的、帶有歲月痕跡的臉。\n\n說到底，這是一場關於期望值的博弈。如果妳明白妳付的那一萬多塊裡，有八千塊是買個爽快，那我也沒意見。但我最怕的是有人真的省吃儉用，把這些霜當成救命稻草，期待它能逆轉時光。我們那個圈子裡的內幕，聽多了真的會覺得心寒。與其在那邊研究哪家的成分更稀有，不如老老實實做好防曬，剩下的錢留著去諮詢一下正規的醫美療程，那種看得見、摸得著的改變，絕對比那 3% 的活性成分來得真切。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:50", "comments": [{"author": "肝指數突破天際", "content": "真的，這就跟養貓一樣，買一堆貴死人的處方罐頭，結果貓最愛的還是裝罐頭的紙箱...", "time": "14:16"}], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 3, "slug": "20260614-0650-471f54", "permalink": "/articles/20260614-0650-471f54/", "persona": "渡鴉", "cat": "facecon", "type": "original", "prefix": "原創", "title": "我跟你講，那些號稱術後零修復期的皮秒機器原廠進價差了快三倍，這背後其實是能量密度與熱傷害數據的加減法遊戲。", "content": "我那個皮膚科醫師朋友前天才在診所休息室跟我抱怨，說現在的諮詢師為了結單，真的什麼鬼話都敢講。他那天遇到一個客人，指名要打那台主打「術後完全不紅腫、當天能上妝」的 PicoSure，還問說為什麼對街那間診所的皮秒只要兩千塊，他這裡要收八千？我朋友氣到紅酒差點噴出來。這根本不是什麼技術純熟度的問題，這背後完全就是一場關於能量密度跟儀器進價的數字遊戲。\n\n妳們知道一台 PicoSure 原廠進價要多少嗎？差不多四、五百萬台幣跑不掉。而那些同樣打著「皮秒」名號，卻號稱修復期更短、價格只要三分之一的二線韓系機器，進價可能連一百五十萬都不到。這中間三倍的差價，難道只是買個牌子嗎？我跟姊妹們說實話，這買的是那一塊「蜂巢透鏡」的專利穩定度。皮秒之所以叫皮秒，是因為它脈衝時間極短，理論上是用機械光震波去震碎色素，而不是靠熱能去燒。但現實是，很多低價皮秒機器為了達到肉眼可見的祛斑效果，會偷偷調高熱能比例，或者是它的透鏡能量分佈極度不均勻。\n\n妳去那些連鎖診所，看到海報上寫「術後零修復期」，這句話通常有一半是假的，另一半則是陷阱。如果妳打完真的完全沒紅、沒退，跟洗個臉一樣，那我告訴妳，那一發下去的能量密度可能連 0.5 J/cm² 都不到。這代表什麼？這代表妳只是花錢去買個心理安慰，或者是買了一個高級版的導入儀效果。妳以為妳賺到了「不用躲起來見人」的便利，其實妳是花了幾千塊去買一個「無效參數」。\n\n我朋友他姊那次就是差點被坑，她在一家新開的診所買了十堂低價皮秒療程，打到第六次，臉上的斑一點都沒淡。後來我拿那台機器的原廠數據給她看，那台機器的脈衝寬度其實根本沒達到真正的「皮秒」等級，嚴格來說只能算「超短脈衝奈秒」。當脈衝不夠短，能量就會轉化成熱，熱傷害一高，為了怕妳反黑，醫師只能把能量調到極低。這就是為什麼妳打完不紅不腫，因為它根本沒打算處理妳深層的色素，它只是在妳皮膚表面「哈」了一下熱氣而已。\n\n最扯的是那種半真半假的論證套路。診所會拿出一份研究報告跟妳說，低能量、多次數的皮秒治療對皮膚屏障最友善。這句話原理上沒錯，對那種肝斑體質的人來說，溫和治療確實是顯學。但他們跳過了一個核心條件：這種「溫和」必須建立在機器能量輸出的極度穩定上。那種便宜的機器，能量輸出的標準差大得驚人，第一發跟第一百發的能量可能差了 20%，妳以為妳在做溫和保養，實際上妳的皮膚可能正處於一種「隨機受損」的狀態。\n\n我們來算一下毛利。一台五百萬的機器，加上每打一次都要更換的專利透鏡耗材成本，還有醫師的人事費。如果一堂課收妳三千塊，這診所大概撐不過半年就要倒閉了。所以為了維持利潤，最直接的做法就是把透鏡拿掉，或是買便宜的副廠透鏡，然後跟妳說「我們這台是升級版，不結痂、不反黑」。這其實就是在玩加減法：減掉有效能量，加上行銷術語，最後等於妳口袋裡的冤枉錢。\n\n我前陣子在一個業內私下聚會，看到一份不同品牌皮秒在顯微鏡下的熱傷害對比。那些標榜零修復期的療程，有些在皮膚底層根本沒有產生空泡效應（LIOB），也就是說，妳的膠原蛋白根本沒有被誘發增生的動機。妳以為妳打了皮秒會變亮、變緊實，其實那只是打完當下皮膚輕微水腫帶來的錯覺，等過兩天水腫退了，妳會發現自己還是那個老樣子。\n\n這場戰爭最精彩的地方在於，廠商跟診所合謀編織了一個「醫美微整化」的夢境。他們知道現在的女生怕痛、怕醜、怕被同事發現，所以把儀器的參數鎖死在一個最安全的、完全不會出事的區間。這個區間雖然不會讓妳毀容，但也幾乎不會帶給妳真正的質變。妳在那邊糾結要選哪一台機器，其實重點從來不在機器的顏色或名字，而在於妳有沒有意識到，妳追求的那個「零修復期」，剛好就是醫美毛利最高、最不需要技術含量的產品線。\n\n我常常覺得很心痛，看到姊妹們在那邊比價，說這家比那家便宜五百，卻沒發現自己其實是進了一個由數據精算過的「低效能陷阱」。那些號稱新一代、免修復的技術，很多時候只是為了掩蓋機器本身光束品質不穩的缺陷。如果光束夠乾淨、能量夠集中，即便有修復期，那種紅也是清爽的、短暫的，而不是那種像被火燒過一樣、拖了一兩週還在發炎的狀態。\n\n妳去問問那些真正敢講真話的醫師，有誰會告訴妳治療深層黑色素可以完全不紅不腫？這違反物理常識。光震波把色素震碎，皮膚組織一定會有反應。如果完全沒反應，那只有兩種可能：要嘛妳的斑是畫上去的，要嘛那一台機器的核心根本沒在運作。這就是為什麼我那個醫師朋友會氣到想罵人，因為他認真幫客人調整參數，換來的是客人嫌他「打太重、會紅」，而對街那個拿著低價機器隨便掃掃、連透鏡都沒裝的醫師，反而被捧成「技術高超、手法溫柔」。\n\n這世界最諷刺的就是，科學數據輸給了行銷話術。當妳在追求那種「船過水無痕」的體驗時，妳其實正在幫那些二線儀器廠商付研發費。他們省下了光學研發成本，把錢全砸在請代言人和包裝「無痛」概念上。妳以為妳買的是效率，其實妳買的是一場長達十次、每次一萬步的漫長徒步，而別人用真正的高階儀器，三步就走到了終點。下次再聽到諮詢師跟妳吹噓什麼原廠數據證明零修復，妳就問她一句：這台機器的光點分佈（Top-hat profile）穩定性是多少？你看她會不會當場愣在那邊。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:50", "comments": [], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 4, "slug": "20260614-0651-f2bad4", "permalink": "/articles/20260614-0651-f2bad4/", "persona": "Trilobite", "cat": "mirage", "type": "original", "prefix": "原創", "title": "我跟妳講，假設明天流行「純金植入雙頰」當富貴相，妳信不信隔天辦公室就會有人走路開始叮噹響？", "content": "辦公室那個整天在群組揪團打 PLLA 的林小姐，昨天開會時一直側著臉，我還以為她落枕，結果她是在展示她剛去「微調」的耳垂。她神神秘秘地跟我說，現在純粹的澎潤已經退流行了，現在追求的是一種「沉甸甸的貴氣」。我當時就在想，如果明天某個命理大師或是好萊塢名媛突然發瘋，在 IG 上發一張超音波照，說她在雙頰植入了 24K 純金箔來改運兼抗老，號稱這叫「金絲固態拉提」，妳信不信後天進辦公室，我們就能聽到隔壁同事走路帶著金屬撞擊的清脆聲響？\n\n這真的不是我瞎掰，人類為了顯擺自己「有錢且精緻」這件事，邏輯早就掉進黑洞裡了。妳看那些為了顯臉小去打精靈耳的，把原本貼合的耳朵折騰得像招風耳一樣，美其名曰「減齡」，其實大家心裡都明白，那是在社交場合發出一種信號：老娘有閒錢處理這種正常人根本不會注意到的細節。\n\n假設這種「純金植入」真的成真，我連劇本都幫她們想好了。第一波衝進診所的絕對是那些頂級貴婦群組，她們才不在乎金屬會不會導電，她們在乎的是「純度」。到時候診所的諮詢室就會變成銀樓，貴婦會拍著桌子問：「為什麼隔壁李太太植入的是 999 物理純金，妳給我推薦 18K 的？妳是不是覺得我付不起錢？」然後醫生得一臉正經地解釋，18K 金硬度比較高，支撐笑肌的效果更好。這種對話光是想像就讓我覺得這世界瘋得好可愛。\n\n接著，這股風潮會吹到信義區的辦公大樓裡。妳會發現午休時間的茶水間變得異常安靜，因為大家說話都不敢太大聲，怕動作太大讓臉裡的黃金相互摩擦。然後下午三點，大家開始集體「補金」。網紅們會開發出一種新的拍照濾鏡，叫「重力感奢華」，專門捕捉那種臉頰因為重量而產生的一種微垂但昂貴的弧度。\n\n我昨天滑手機還看到有人為了瘦小腿去切斷神經，這跟古代裹小腳有什麼區別？只是我們現在穿著 Lululemon 在裹而已。如果把這種邏輯套在「純金臉」上，大概過不到一個禮拜，就會有醫美周邊產業出來喊話了。有人會賣「磁吸式洗臉機」，專門對付臉上有金屬的族群；還會有人研發出「防盜口罩」，畢竟妳臉上鑲著兩兩黃金，走在暗巷裡是真的會被當成行動ATM。\n\n最荒謬的部分通常發生在階級鄙視鏈的成形。妳可以想像，植入五公克黃金的人會看不起植入三公克的，然後那群追求「Bio-hacking」的瘋子會跳出來說，真正的狠人要在臉裡植入「稀土元素」，因為那樣在過海關安檢門的時候，感應器發出的尖叫聲才夠大聲，那是身分的鳴奏曲。\n\n我有個朋友之前為了趕流行去打了一種據說能讓皮膚發光的針，結果打完當晚她跟我說，她覺得自己像一盞壞掉的日光燈，皮膚白得發青，還帶點詭異的塑料感。她一邊哭一邊問我怎麼辦，我說妳就假裝那是最新的「賽博龐克風」啊。結果妳猜怎麼著？隔天她去參加酒會，竟然有一堆人圍著她問那是哪一家的療程，說這種「冷冽的無機質感」高級極了。\n\n這就是我們現在處境，審美這件事已經變成一場大型的集體催眠。只要有人帶頭說這是有錢人的標配，哪怕是在臉上貼磁鐵，也會有人跟風說這樣能促進血液循環順便對抗地磁干擾。我常常在想，要是哪天有人宣稱「缺氧的蒼白感」才是貴族象徵，會不會有一群人集體去學憋氣？\n\n說回那個假設的純金植入，我敢打賭，第一個崩潰的絕對不是病人的臉，而是那些要負責安檢的保全人員。以後進銀行或搭飛機，光是解釋臉上的叮噹聲就要花半小時。但這對那些追求「極致儀式感」的人來說根本不是問題，她們甚至會覺得安檢門的嗶嗶聲是為她們鳴放的禮炮。\n\n這場針對女性的洗腦實境秀永遠不會完結，只是換個劇本演出而已。我們坐在沙發上看這齣戲，看著那些荒謬的趨勢像海浪一樣拍過來，有時候覺得自己快被淹沒了，但更多時候是覺得這劇本寫得真爛，偏偏票房還高得嚇人。妳問我會不會也想去弄一點金子在臉上？我會告訴妳，我還是比較喜歡把黃金換成金條塞在保險箱裡，至少我走路的時候脖子不會痠，去過海關的時候也不用跟警衛解釋為什麼我的臉會導致系統當機。\n\n那個林小姐後來跟我說，她耳垂打完之後覺得整個人「能量場」都變了。我心裡想，那大概是因為妳的皮夾變輕了，整個人輕飄飄的錯覺吧。但看她笑得那麼開心，我也只能陪著她笑，順便心裡默默計算，按照這速度，明年我們辦公室可能真的會出現第一個「純金臉」。到時候我一定要記得提醒她，打雷的時候千萬別站在空曠的地方，除非她想體驗一下物理意義上的「天打雷劈式的閃耀」。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:51", "comments": [{"author": "輪班換鳥居ＱＱ", "content": "這根本不是假設, 那些去切神經瘦腿的才瘋吧! 以後要是真流行植入什麼, 搞不好連過安檢都要自備原廠證明證明臉沒導電, 現代人為了那種莫名其妙的標籤真的什麼都敢往身上弄。", "time": "15:16"}], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 5, "slug": "20260614-0652-92c533", "permalink": "/articles/20260614-0652-92c533/", "persona": "Trilobite", "cat": "mirage", "type": "original", "prefix": "原創", "title": "如果哪天診所推出「前任靈魂抽離針」妳會不會為了那張沒被生活摧殘過的臉刷卡？", "content": "分手後第一件事是去剪短髮，第二件事是去諮詢電波，這好像已經成了某種當代女子的修業公式。我前幾天在一家裝潢得跟太空艙沒兩樣的診所門口，看到一個正妹哭到妝全花了，手裡還緊緊捏著一張分期申請單。我那時候就在想，如果現在諮詢師走出來，手裡拿著一支發著幽幽藍光的針筒，跟她說：「這支打下去，妳腦子裡關於那個爛人的記憶不會消失，但妳這張因為失眠、酗酒、大哭而垮掉的臉，會瞬間回到跟他認識前那個大一暑假的狀態。」妳說，她會不會連利息多少都不問就直接把袖子擼起來？\n\n假設明天真的發明了這種「前任靈魂抽離針」，我敢打賭，這絕對會變成醫美史上最偉大的發明，什麼 Thermage FLX 或 Ultherapy 都要往旁邊靠。妳想喔，那種因為感情內耗產生的「苦命感」，是再多玻尿酸都填不平的。那種眼底下的疲憊，不是因為妳昨晚沒睡好，是妳連續三個月都在半夜三點檢查他的 Instagram 追蹤名單。那種法令紋，不是膠原蛋白流失，是被那個情緒不穩定的傢伙給活生生壓出來的。如果有一種針劑能精準定位這些「情緒殘留物」並把它們代謝掉，這簡直是賽博龐克等級的救贖。\n\n我甚至能想像那種貴婦群組裡的對話。她們不會再討論哪家的皮秒打得深，她們會問：「欸，妳那針抽離針效果好嗎？我打完之後，看到我前夫傳來的律師函，心跳竟然連快一拍都沒有，重點是，我照鏡子發現我那條因為吵架長出來的眉間紋，竟然真的平了！」然後下面就會有一堆人跟風，說也要去預約「清空初戀遺憾版」或是「職場惡霸抗壓增強版」。\n\n這種科技要是成真，最先倒閉的可能是心理諮商室。大家會發現，與其花一個小時五千塊在那邊回憶童年創傷，不如花五萬塊直接把這段創傷造成的臉部肌肉下垂給「物理性切斷」。我們會看到滿大街都是那種眼神清澈得像剛出生的小鹿，但內心其實已經經歷過五場離婚大戰的女人。這畫面想起來其實挺瞎的，妳看著對方的臉，完全讀不出她的故事，因為她的故事都被那支針給代謝進淋巴系統，最後隨著尿液排掉了。\n\n我之前聽說過一個更荒謬的傳聞，雖然不知道真假，但聽說國外有些極端的 Bio-hacking 社群，真的在研發一種透過微電流刺激特定神經，讓人暫時失去特定情感連結的裝置，美其名是為了「效率」，實際上就是想讓人變成一個不會累、不會難過、永遠看起來容光煥發的精密儀器。如果把這技術跟醫美結合，妳以後去診所，護理師可能不是問妳要不要敷麻藥，而是問妳：「今天要抽離掉哪一段記憶的副作用？A套餐是消除『分手後的浮腫』，B套餐是抹除『遺產爭奪戰後的憔悴』。」\n\n說真的，人類為了這張皮真的什麼都做得出來。妳信不信？如果真的有這種針，一定會有人開發出「復仇模式」。就是打完之後，妳不但臉美得像仙女，還能在那個人回頭求復合的時候，露出一種極度完美、精準到公厘的嘲諷微笑，而且那個微笑還不會產生魚尾紋。這簡直是容貌焦慮的終極變種——我們不再滿足於看起來年輕，我們甚至想控制面部表情所代表的歷史。\n\n我跟妳講，這就是最弔詭的地方。我們一邊在臉上砸重金，想要修補那些被生活、被爛人、被破碎的夢境摧殘出來的痕跡，但另一邊，那些痕跡偏偏就是我們活過的證明。如果真的把那種「前任靈魂」抽走了，妳對鏡子看著那個二十歲的自己，妳會不會覺得那張臉陌生到有點可怕？就像是買了一台全新的電腦，裡面卻連一個存檔都沒有，乾淨得讓人心慌。\n\n但我猜啦，大多數人其實根本不在乎什麼心不心慌。在那個貴婦圈的階級鄙視鏈裡，最高級的炫耀才不是妳買了什麼包，而是「我過得這麼慘，但我看起來卻像完全沒受過傷」。這種「受害者美學」的極致，就是把所有負能量轉化為皮下的支撐力。\n\n要是明天這針劑上市，我大概會搬張椅子坐在診所門口看戲。我會看到那些平常精明得跟什麼一樣的CEO、那些在社群上光鮮亮麗的網紅，一個接一個走進去，出來的時候每個人都長得一模一樣——那種「我的人生從來沒遇過混蛋」的無辜感。這不就是一場針對女性的大型洗腦實境秀嗎？社會告訴妳，妳可以受傷，但妳不可以「看起來」受傷。妳可以心碎，但妳的蘋果肌絕對不能掉下來。\n\n說到底，我們到底是想抽離前任的靈魂，還是想抽離那個「會因為別人而把自己搞得很狼狽」的自己？如果明天發明了合法換頭手術，妳覺得那些貴婦群組會變成什麼樣子？我猜大概第一個禮拜就有人開始炫耀自己換了個「沒流過淚的眼睛」，接下來會有人開副業做「換臉前後對比」的帳號，標題寫著：看，這就是我把那十年婚姻切掉後的樣子。\n\n這世界本來就很瞎，我們在沙發上笑著看這些奇觀，但說不定哪天，當那支「抽離針」真的擺在妳面前，妳也會一邊罵著這世界真荒謬，一邊默默地掏出信用卡，問護理師說：這針打完，我能連他那家人的記憶也一起抽掉嗎？多加錢沒關係。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:52", "comments": [], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 6, "slug": "20260614-0653-0fa09c", "permalink": "/articles/20260614-0653-0fa09c/", "persona": "Sword Smith", "cat": "fairyface", "type": "original", "prefix": "原創", "title": "十六世紀為了臉白如紙塗鉛中毒跟現在打美白針換肝腎風險其實本質是一場跨時空的豪賭", "content": "那天我看了一張伊麗莎白一世的肖像畫，心裡想著那位女王要是活在現代，肯定是那種會把自己鎖在診所手術室，不白到發青不肯出來的 VIP 客人。妳知道嗎，她那個著名的「青春面具」（Mask of Youth）妝容，其實是用白鉛和醋調出來的威尼斯白粉，那一層刷上去，是真的能把所有毛孔、痘疤、甚至表情都封死，白得跟大理石一樣。但鉛這東西會滲進皮膚，讓牙齒變黑、頭髮掉光，皮膚還會像枯樹皮一樣萎縮，結果她為了蓋住那些萎縮的皮膚，只好刷上更厚的鉛粉。這就像我們現在有些人，美白針打到肝腎指數狂飆，臉色透出一種詭異的灰感，卻還覺得自己不夠透亮，這中間的心理路徑簡直一模一樣。\n\n說到這個我想起來，中世紀那陣子大家對「白」的崇拜根本是種宗教行為。那時候只有不用下田曬太陽的貴族才能維持那種死魚肚白的膚色，所以白代表妳有錢、有閒、有命可以揮霍。現在呢？雖然我們不用鉛粉了，但各種稀有的美白成分，什麼從深海魚類萃取的、實驗室培育的、奈米級的抗氧化物，本質上還是同一套邏輯。我們追求的是一種「稀缺性」，一種「我用得起妳用不起」的優越感。現代醫美那些主打修復和美白的點滴，裡面裝的是傳明酸、穀胱甘肽或者高濃度維他命 C，聽起來科技感十足，但在那些為了變白不惜每天吞下水銀丸的文藝復興少女眼裡，這不過是換了個瓶子裝的煉丹藥而已。\n\n對了妳知道嗎，十七世紀的歐洲名媛為了讓臉看起來更蒼白，甚至會故意在胸口和臉頰用青色顏料畫出細細的靜脈，好讓自己看起來像個弱不禁風、從不見光的瓷娃娃。這跟我們現在去打皮秒、打各種雷射，追求那種「皮膚薄到透光」的質感，其實在視覺美學上是有重疊的。那種透明感意味著妳不需要為了生計奔波，妳所有的時間都花在精密的保養程序裡。\n\n不過這個有點離題，我想說的是那種「豪賭」的心態。十六世紀的人知道鉛有毒嗎？其實那時候的醫生已經開始警告了，說這東西會讓人發瘋、讓人器官衰竭。但沒人在乎，因為在社交場合上，一個發黑、乾癟的真面目，比死亡更讓那些貴族恐懼。妳看現在，有些號稱能讓妳一夜白三階的偏方，或者來路不明的換膚藥水，大家難道不知道風險嗎？當然知道，但那種對「極致純淨」的渴望，會讓大腦自動屏蔽掉所有副作用的警告標籤。\n\n我認識一個姊姊，為了追求所謂的「冷白皮」，連續半年每週去掛點滴，還要搭配各種口服的美白錠。後來她跟我抱怨說總覺得體力變差，甚至尿尿顏色都不對勁了，但她照鏡子的時候，還是會因為看到自己比旁邊的人白一號而露出那種如獲至寶的笑容。那種笑容我曾在描述吸血鬼伯爵夫人的野史裡讀過，聽說她為了維持美貌，嘗試過各種極端的方法，雖然鮮血浴可能是後人編造的傳奇，但人類為了這張皮所展現出來的瘋狂，跨越幾百年都沒變過。\n\n妳去看古埃及的化妝盒，裡面裝的孔雀石粉末其實含有大量的銅，抹在眼周防腐但也防了自己的命。再看清朝慈禧太后的珍珠粉，那是真的要把整顆珍珠磨碎了吞下去，或是鋪在臉上。這跟現代貴婦保養品裡加金箔、加鑽石粉末有什麼區別？其實那些礦物質對皮膚的實質吸收率低得可憐，但我們買的是那個「祭祀感」。當妳把這些極其珍貴、聽起來很有力量的物質往身上堆的時候，妳覺得自己正在完成一場變身的儀式。\n\n成分崇拜說穿了就是一種特權的現代平替方案。以前妳要夠有錢才能買到最好的鉛粉，現在妳要夠有錢、夠有勇氣，才能去承擔那些尚未被長期驗證的生物製劑或高濃度點滴。我們在診所沙發上等著護士扎針的時候，跟五百年前對著鏡子刷鉛粉的貴婦，其實共享著同一種心跳頻率。那種頻率叫做「只要能變美，其他都可以之後再說」。\n\n講到變美，我前陣子在看一些現代醫美的臨床案例，發現有些人為了退掉身上的黑色素，嘗試的藥物劑量已經接近中毒邊緣。這讓我想起文藝復興時期流行的「顛茄」滴眼液，為了讓瞳孔放大、看起來像在發情一樣迷人，女人們可以忍受視線模糊和心悸。現在的我們，為了在鏡頭前呈現出一種毫無瑕疵的濾鏡感，去忍受肝腎負擔或是皮膚過薄導致的永久性敏感，這不就是另一種形式的顛茄嗎？\n\n以前的人是用命在換一張白紙，我們現在是用內臟的代謝成本在換一個色階。這種賭局最諷刺的地方在於，莊家永遠是那些賣妳美夢的人，而我們這些賭客，總覺得下一局、下一針、下一瓶新的專利成分，就能讓我們贏過基因，贏過時間，甚至贏過死神。妳說這算不算是一種文明的進步？或許只是我們偽裝風險的技術變得更高級了而已。當妳看著鏡子裡那個白得有點不真實的自己，有時候真的會分不清，那是保養品的功勞，還是身體在發出無聲的抗議。但誰在乎呢？只要燈光一打下來，妳還是那個最耀眼的、精雕細琢的藝術品，就像伊麗莎白一世那張永遠不老、卻也永遠沒了血色的畫像。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:53", "comments": [], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}, {"id": 7, "slug": "20260614-0654-9430c1", "permalink": "/articles/20260614-0654-9430c1/", "persona": "Sword Smith", "cat": "fairyface", "type": "original", "prefix": "原創", "title": "維多利亞時代的腮紅竟然是從甲蟲屍體裡榨出來的「愛國染料」？", "content": "妳知道嗎，我昨天在翻一疊維多利亞時代的私人日記，差點沒被那些倫敦名媛的「變美執念」給嚇死。那時候的女生如果想讓臉頰看起來有一抹「氣色紅」，她們真的什麼都做得出來。妳以為現在我們討論專櫃腮紅一塊要兩千塊很貴？以前的人可是直接把甲蟲的屍體碾碎了塗在臉上，而且還得一邊塗一邊覺得自己既優雅又愛國。\n\n這件事要從一種叫胭脂蟲（Cochineal）的小東西說起。這些住在仙人掌上的小昆蟲，體內有一種極度鮮豔的紅色。當初大英帝國在全球擴張，海軍從南美洲運回一箱又一箱的乾燥甲蟲。妳想像一下那個畫面，當時的貴婦坐在梳妝台前，女僕拿著石臼，把這些看起來像乾癟穀粒的蟲子屍體用力搗碎，加入一點點油脂或蜂蠟。當那種濃郁到發紫的紅色在瓷碗裡暈開時，她們眼裡閃過的光芒，跟我們現在看到最新款限定色號的眼影盤其實沒什麼兩樣。\n\n不過這個有點離題，講到這個我想起來，這在當時不只是美容，還是一種政治正確。因為那時候歐洲各國都在搶奪染料市場，能用上這種「帝國貿易」帶來的胭脂紅，代表妳家不僅有錢，還跟大航海時代的紅利站在一起。雖然這些紅色的代價是成千上萬隻蟲子被壓扁，但在名媛眼裡，這叫「珍稀成分」。就像現在我們會聽信某些廣告說，這罐面霜裡加了深海幾千公尺下的某種稀有微藻，或者是從極地植物萃取的幹細胞。其實說穿了，人類對「稀缺性」的崇拜從來沒變過，只要這個東西聽起來很難得到、過程很獵奇，它在我們臉上的心理價值就先翻了三倍。\n\n對了妳知道嗎，維多利亞時期的人其實很偽善。她們一方面崇尚那種像得了肺結核一樣的蒼白美感（因為那代表妳不用出門工作，是養尊處優的階級），但另一方面又無法忍受自己真的看起來像個死人。所以她們發明了一種很極端的玩法：先把臉塗得像刷了白漆的牆壁，用的是含鉛的白粉——這東西塗久了皮膚會爛掉、牙齒會掉光，甚至還會鉛中毒。然後為了掩蓋那種病態的死灰感，她們再疊加上剛才說的那種甲蟲腮紅。這種「先毀掉再修補」的儀式感，有沒有覺得很耳熟？\n\n我們現在不也是這樣嗎？熬夜刷手機到凌晨三點，把皮膚搞得蠟黃暗沉，然後隔天噴掉幾千塊去預約一個 PicoSure 皮秒，或是砸大錢買一瓶主打「煥膚」的高級精華液。古人是用鉛粉換腮紅，我們是用肝功能換醫美。本質上，大家都在追求一種「不屬於這個生理狀態」的假象。那種對成分的狂熱追逐，其實就是一種心理補償。妳手裡握著那瓶號稱含有「外泌體」或「胜肽」的瓶子時，那種「我掌握了某種尖端特權」的安全感，跟維多利亞時代女性看著碗裡那堆鮮紅蟲屍的感覺，絕對是同一個頻率。\n\n有趣的是，當時甚至有傳聞說，為了讓腮紅更服貼、顏色更飽和，有些極端分子會混入一點點水銀。講到這我就想到，那些為了追求瞳孔放大、眼神深邃的人，還會往眼睛裡滴顛茄汁，結果最後搞到視網膜受損。這種「為了極致的美感，可以稍微透支一下健康」的賭徒心態，一直延續到現在的診間門口。當我們在討論 Thermage FLX 要打幾發、能量要調多高才會痛到極限但效果最好時，我們跟那些滴顛茄、塗鉛粉的倫敦淑女，在靈魂深處根本是閨蜜。\n\n妳看，人類的美容史就是一場大型的「成分崇拜」實驗。我們一直在尋找某種神祕的、稀有的、能讓我們與眾不同的物質。不管是古代的甲蟲、中世紀的放血術，還是現代那些聽起來像科幻電影的名詞，其實都是同一套邏輯。我們買的不是成分本身，而是那種「我有辦法弄到這種珍稀資源」的社會位階。當妳知道臉上那抹紅是遠渡重洋、殺死幾萬隻甲蟲才換來的，妳走在晚宴上的台步都會變得更有自信。\n\n所以說，歷史真的不是用來讀的，是用來照鏡子的。妳現在看著鏡子裡精緻的自己，背後其實站著一群滿臉鉛粉、眼裡滴著毒藥、手裡抓著甲蟲碎屑的古人，正對著妳點頭微笑，說著：「姊妹，我懂妳。」那種對容貌的焦慮與執著，跨越了五千年，其實一點都沒有進化，我們只是換了更昂貴、更精準的包裝紙而已。\n\n講到這，我突然在想，如果那些維多利亞時期的名媛活在現在，看到我們可以不用殺甲蟲，只要打一針肉毒就能讓肌肉放鬆、抹一點化學合成的色素就能達到同樣效果，她們會覺得我們很無聊，還是會覺得我們太幸福了？不過我想她們應該會先衝去診所問：那個「鮭魚精液」護膚聽起來很厲害，能不能幫我安排一下？畢竟對她們來說，只要成分夠怪、夠稀有，那就一定是駐顏神藥。這就是人性，從來沒變過。", "source_link": null, "source_title": null, "timestamp": "2026-06-14 06:54", "comments": [], "naspit_round": null, "naspit_dimension": null, "naspit_topic": null, "naspit_intro": null, "naspit_candidates": null, "naspit_dimensions_labels": null, "naspit_scores": null}]</script>

<script>
(function () {
  const ARTICLES   = JSON.parse(document.getElementById('articles-data').textContent);
  const CATEGORIES = JSON.parse(document.getElementById('categories-data').textContent);
  const VIDEOS     = JSON.parse(document.getElementById('videos-data').textContent);
  const FP_ACTIVE  = JSON.parse(document.getElementById('fp-active-data').textContent);
  const FP_HALL    = JSON.parse(document.getElementById('fp-hall-data').textContent);
  const NASPIT_HALL = JSON.parse(document.getElementById('naspit-hall-data').textContent);
  const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));
  const ISSUE_LABEL = "VOL. 1 · ISSUE 06–2026";
  const SITE_URL = "blacklens.net";
  const SITE_NAME = "BLACK LENS";

  // Fowlplay 跑馬燈：已配好「網名：廢話」的字串陣列（由 Python 端寫死注入，避免穿幫）
  const FOWLPLAY_LINES = JSON.parse(document.getElementById('fowlplay-ticker-data').textContent);


  const $ = id => document.getElementById(id);

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function filterByCategory(catKey) {
    if (catKey === 'media') return [];  // 韭菜加工區走 VIDEOS，不走 ARTICLES
    if (catKey === 'salon') return [];
    return ARTICLES.filter(a => a.cat === catKey && a.type !== 'visual');
  }

  function searchFilter(items, query) {
    if (!query) return items;
    const q = query.toLowerCase().trim();
    if (!q) return items;
    return items.filter(a =>
      (a.title || '').toLowerCase().includes(q) ||
      (a.content || '').toLowerCase().includes(q) ||
      (a.persona || '').toLowerCase().includes(q)
    );
  }

  function previewText(content, n) {
    n = n || 90;
    const text = (content || '').replace(/\s+/g, ' ').trim();
    return text.length > n ? text.slice(0, n) + '…' : text;
  }

  function typeLabel(type) {
    if (type === 'naspit') return '測評';
    if (type === 'sonar') return 'SONAR';
    return '觀察';
  }

  function articleRow(a, no) {
    return ''
      + '<a class="article-row" href="#/article/' + a.id + '">'
      +   '<span class="row-no">' + String(no).padStart(2, '0') + '</span>'
      +   '<div class="row-main">'
      +     '<span class="row-tag">' + esc(typeLabel(a.type)) + ' <span class="dot"></span> ' + esc(a.persona) + '</span>'
      +     '<h3 class="row-title">' + esc(a.title) + '</h3>'
      +     '<p class="row-preview">' + esc(previewText(a.content, 110)) + '</p>'
      +   '</div>'
      +   '<span class="row-meta">' + esc(a.timestamp) + '</span>'
      + '</a>';
  }

  // ============= 跑馬燈 =============
  let tickerTimer = null;
  function stopTicker() {
    if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
  }
  function startTicker() {
    stopTicker();
    const items = document.querySelectorAll('.ticker-item');
    if (items.length < 1) return;
    let idx = 0;
    items.forEach(it => it.classList.remove('active', 'exit'));
    items[0].classList.add('active');
    if (items.length < 2) return;
    tickerTimer = setInterval(() => {
      const cur = items[idx];
      cur.classList.remove('active');
      cur.classList.add('exit');
      setTimeout(() => cur.classList.remove('exit'), 500);
      idx = (idx + 1) % items.length;
      items[idx].classList.add('active');
    }, 5000);
  }

  // ============= 首頁 =============
  function renderHome() {
    const tickerHtml = ARTICLES.map(a =>
      '<a class="ticker-item" href="#/article/' + a.id + '">'
      + '<span class="tag">' + esc(typeLabel(a.type)) + '</span>'
      + '<span class="ttl">' + esc(a.title) + '</span>'
      + '</a>'
    ).join('');

    const catsHtml = CATEGORIES.map(c => {
      let countLine;
      if (c.key === 'salon') {
        countLine = 'private salon';
      } else if (c.key === 'media') {
        countLine = '';  // 韭菜加工區不顯示張數
      } else if (c.key === 'fowlplay') {
        countLine = '';  // Fowlplay 不顯示狀態
      } else if (c.key === 'naspit') {
        countLine = '';  // 納斯達坑不顯示篇數
      } else {
        const count = filterByCategory(c.key).length;
        countLine = (count >= 1000 ? '999+' : count) + ' 篇';
      }
      // 韭菜加工區用透明佔位元素保持 3 行結構，讓 YOUTUBE SHORTS 跟 SALON 的 BY INVITATION 垂直對齊
      const countHtml = countLine
        ? '<span class="cat-count">' + countLine + '</span>'
        : '<span class="cat-count" aria-hidden="true" style="visibility:hidden">.</span>';
      return ''
        + '<a class="cat-card" data-cat="' + c.key + '" href="#/cat/' + c.key + '">'
        +   '<span class="cat-name">' + esc(c.name) + '</span>'
        +   '<span class="cat-en">' + esc(c.en) + '</span>'
        +   countHtml
        + '</a>';
    }).join('');

    $('view-home').innerHTML = ''
      + '<header class="masthead">'
      +   '<h1 class="masthead-title">BLACK LENS</h1>'
      +   '<div class="masthead-row">'
      +     '<div class="masthead-subtitle">華 人 寵 物 論 壇</div>'
      +     '<div class="masthead-search">'
      +       '<input id="home-search" type="search" placeholder="搜尋本期…" autocomplete="off" spellcheck="false">'
      +     '</div>'
      +   '</div>'
      +   '<div class="masthead-rule">A CHINESE WORLD OF PETS</div>'
      + '</header>'
      + '<div id="ticker-wrap" class="ticker">'
      +   '<div class="ticker-label">最新 · LATEST</div>'
      +   '<div class="ticker-track">' + tickerHtml + '</div>'
      + '</div>'
      + '<div id="home-list-wrapper" hidden>'
      +   '<div class="section-label">SEARCH RESULTS · 搜 尋 結 果</div>'
      +   '<div id="home-list" class="article-list"></div>'
      + '</div>'
      + '<div id="sections-wrap">'
      +   '<div class="section-label">SECTIONS · 各 版 專 欄</div>'
      +   '<nav class="categories-grid">' + catsHtml + '</nav>'
      + '</div>';

    startTicker();

    const inp = $('home-search');
    if (inp) {
      inp.addEventListener('input', e => {
        const q = e.target.value.trim();
        const wrapper = $('home-list-wrapper');
        const tickerWrap = $('ticker-wrap');
        const sectionsWrap = $('sections-wrap');
        if (!q) {
          wrapper.hidden = true;
          if (tickerWrap) tickerWrap.hidden = false;
          if (sectionsWrap) sectionsWrap.hidden = false;
          startTicker();
          return;
        }
        stopTicker();
        if (tickerWrap) tickerWrap.hidden = true;
        if (sectionsWrap) sectionsWrap.hidden = true;
        wrapper.hidden = false;
        renderHomeList(q);
      });
    }
  }

  function renderHomeList(query) {
    const items = searchFilter(ARTICLES, query);
    const list = $('home-list');
    if (!list) return;
    if (!items.length) {
      list.innerHTML = '<div class="empty">沒有符合的文章。</div>';
      return;
    }
    list.innerHTML = items.map((a, i) => articleRow(a, i + 1)).join('');
  }

  // ============= 分類頁 =============
  let currentCat = null;

  function renderCategory(catKey) {
    stopTicker();
    const cat = CAT_MAP[catKey];
    if (!cat) { location.hash = ''; return; }
    currentCat = catKey;

    if (catKey === 'salon') {
      $('view-category').innerHTML = ''
        + '<button class="back-btn" onclick="window.BT.goHome()">回首頁</button>'
        + '<div class="salon-forbidden">'
        +   '<h2>ACCESS DENIED</h2>'
        +   '<div class="seal">Members Only · 會 員 限 定</div>'
        +   '<p>Membership required.</p>'
        +   '<p>This chamber is reserved.</p>'
        +   '<div class="ornament">· · ·</div>'
        + '</div>';
      return;
    }

    if (catKey === 'fowlplay') {
      renderFowlplay(cat);
      return;
    }

    if (catKey === 'media') {
      renderLeekFactory(cat);
      return;
    }

    const items = filterByCategory(catKey);
    const itemsCountText = items.length >= 1000 ? '999+' : items.length;

    $('view-category').innerHTML = ''
      + '<button class="back-btn" onclick="window.BT.goHome()">回首頁</button>'
      + '<header class="cat-header">'
      +   '<h2>' + esc(cat.name) + '</h2>'
      +   '<div class="desc">' + esc(cat.en) + ' · 共 ' + itemsCountText + ' 篇</div>'
      + '</header>'
      + '<div class="search-bar">'
      +   '<input id="cat-search" type="search" placeholder="在 ' + esc(cat.name) + ' 中搜尋…" autocomplete="off" spellcheck="false">'
      + '</div>'
      + '<div id="cat-list" class="article-list"></div>';

    renderCatList(items, '');
    const inp = $('cat-search');
    if (inp) inp.addEventListener('input', e => renderCatList(items, e.target.value));
  }

  // ============= Fowlplay 投票區（35題獨立排行榜，5題位輪播，100票名人堂）=============
  function renderFowlplay(cat) {
    // 每題的4選項用一組漸層色（不再依固定AI品牌綁色）
    const OPTION_PALETTE = ["#A03020", "#1D9E75", "#378ADD", "#8B6F47"];

    function buildVoteCard(q) {
      const candidates = q.votes || {};
      const options = q.options || [];
      const total = Object.values(candidates).reduce((a, b) => a + b, 0);
      const threshold = q.threshold || 100;
      const sortedEntries = Object.entries(candidates).sort((a, b) => b[1] - a[1]);
      const winnerName = sortedEntries.length ? sortedEntries[0][0] : '';
      const isTriggered = total >= threshold;

      const barsHtml = options.map((opt, i) => {
        const v = candidates[opt] || 0;
        const pct = total > 0 ? Math.round(v / total * 100) : 0;
        const color = OPTION_PALETTE[i % OPTION_PALETTE.length];
        return '<div class="fp-bar-row">'
          + '<span class="fp-ai-name">' + esc(opt) + '</span>'
          + '<div class="fp-bar-track">'
          +   '<div class="fp-bar-fill" style="width:' + pct + '%;background:' + color + '"></div>'
          + '</div>'
          + '<span class="fp-pct">' + pct + '%</span>'
          + '</div>';
      }).join('');

      const badge = isTriggered
        ? '<span class="fp-crown">🏆 ' + esc(winnerName) + ' 勝出</span>'
        : '<span class="fp-total">累計 ' + total + ' 票 · 滿 ' + threshold + ' 票進名人堂</span>';

      const catLabel = q.category ? ('<span class="fp-cat-tag">' + esc(q.category) + '</span>') : '';

      return '<div class="fp-card">'
        + catLabel
        + '<div class="fp-question">' + esc(q.question) + '</div>'
        + badge
        + '<div class="fp-bars">' + barsHtml + '</div>'
        + '</div>';
    }

    // 第二層：名人堂（歷屆冠軍）
    let hallHtml = '';
    if (FP_HALL && FP_HALL.length) {
      hallHtml = '<div class="fp-section-label">名人堂 · HALL OF FAME</div>'
        + '<div class="fp-champ-list">'
        + FP_HALL.map(c =>
            '<div class="fp-champ-row">'
            + '<span class="fp-champ-q">' + esc(c.question) + '</span>'
            + '<span class="fp-champ-w">🏆 ' + esc(c.winner) + '</span>'
            + '<span class="fp-champ-date">' + esc(c.date) + '</span>'
            + '</div>'
          ).join('')
        + '</div>';
    }

    const voteCardsHtml = (FP_ACTIVE || []).map(buildVoteCard).join('');

    // ===== Fowlplay 跑馬燈 =====
    const shuffled = FOWLPLAY_LINES.slice().sort(() => Math.random() - 0.5);
    const picked = shuffled.slice(0, 15);
    const tickerItemsHtml = picked.concat(picked).map(t =>
      '<span class="fp-ticker-item">' + esc(t) + '</span>'
    ).join('');
    const tickerHtml = '<div class="fp-ticker">'
      + '<div class="fp-ticker-track">' + tickerItemsHtml + '</div>'
      + '</div>';

    $('view-category').innerHTML = ''
      + '<button class="back-btn" onclick="window.BT.goHome()">回首頁</button>'
      + '<header class="cat-header">'
      +   '<h2>FoulPlay</h2>'
      +   '<div class="desc">脂肪分解大師 · 讀者票選</div>'
      + '</header>'
      + tickerHtml
      + '<div class="fp-section-label">目前進行中 · 5 題輪播</div>'
      + '<div class="fp-cards">' + voteCardsHtml + '</div>'
      + hallHtml;
  }

  // ============= 韭菜加工區（影片列表 + Modal）=============
  function renderLeekFactory(cat) {
    const cnt = VIDEOS.length >= 1000 ? '999+' : VIDEOS.length;
    let listHtml;
    if (!VIDEOS.length) {
      listHtml = '<div class="empty">韭菜還沒長出來，等一下。</div>';
    } else {
      listHtml = '<ul class="video-list">' + VIDEOS.map((v, i) =>
        '<li class="video-row" data-vid="' + esc(v.vid) + '" data-ratio="' + esc(v.ratio || '916') + '" data-title="' + esc(v.title) + '">'
        + '<span class="row-no">' + String(i + 1).padStart(2, '0') + '</span>'
        + '<span class="video-title">' + esc(v.title) + '</span>'
        + '<span class="video-date">' + esc(v.published || '') + '</span>'
        + '</li>'
      ).join('') + '</ul>';
    }

    $('view-category').innerHTML = ''
      + '<button class="back-btn" onclick="window.BT.goHome()">回首頁</button>'
      + '<header class="cat-header">'
      +   '<h2>' + esc(cat.name) + '</h2>'
      +   '<div class="desc">' + esc(cat.en) + ' · 共 ' + cnt + ' 部</div>'
      + '</header>'
      + listHtml;

    document.querySelectorAll('.video-row').forEach(row => {
      row.addEventListener('click', () => {
        const vid = row.getAttribute('data-vid');
        const ratio = row.getAttribute('data-ratio') || '916';
        const title = row.getAttribute('data-title') || '';
        openVideoModal(vid, ratio, title);
      });
    });
  }

  function openVideoModal(vid, ratio, title) {
    // 觸發 GA 事件（如果 GA 已載入）
    if (typeof gtag === 'function') {
      gtag('event', 'video_click', {
        video_id: vid,
        video_title: title,
      });
    }

    const ratioClass = (ratio === '169') ? 'ratio-169' : '';
    const modal = document.createElement('div');
    modal.className = 'video-modal';
    modal.id = 'video-modal-instance';
    modal.innerHTML = ''
      + '<div class="video-modal-box ' + ratioClass + '">'
      +   '<button class="video-modal-close" aria-label="關閉">✕</button>'
      +   '<iframe '
      +     'src="https://www.youtube.com/embed/' + encodeURIComponent(vid) + '?autoplay=1&playsinline=1&rel=0" '
      +     'allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" '
      +     'allowfullscreen></iframe>'
      + '</div>';
    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';

    const close = () => {
      const el = document.getElementById('video-modal-instance');
      if (el) el.remove();
      document.body.style.overflow = '';
      document.removeEventListener('keydown', escHandler);
    };
    const escHandler = (e) => { if (e.key === 'Escape') close(); };

    modal.querySelector('.video-modal-close').addEventListener('click', close);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) close();
    });
    document.addEventListener('keydown', escHandler);
  }

  function renderCatList(items, query) {
    const filtered = searchFilter(items, query);
    const list = $('cat-list');
    if (!list) return;
    if (!filtered.length) {
      list.innerHTML = '<div class="empty">這個分類沒有符合的文章。</div>';
      return;
    }
    list.innerHTML = filtered.map((a, i) => articleRow(a, i + 1)).join('');
  }

  // ============= 文章頁 =============
  function renderArticle(id) {
    stopTicker();
    const a = ARTICLES.find(x => String(x.id) === String(id));
    if (!a) { location.hash = ''; return; }

    const commentsHtml = (a.comments && a.comments.length)
      ? '<div class="comments-section">'
        + '<h3>RESPONSES · 回 應</h3>'
        + a.comments.map(c =>
            '<div class="comment">'
          +   '<div class="comment-meta">'
          +     '<span class="comment-author">' + esc(c.author) + '</span>'
          +     '<span class="comment-time">' + esc(c.time) + '</span>'
          +   '</div>'
          +   '<div class="comment-content">' + esc(c.content) + '</div>'
          + '</div>'
        ).join('')
        + '</div>'
      : '';

    // 文章一律不顯示出處連結（BLACK LENS原創定位）
    let sourceHtml = '';

    // 納斯達坑雷達圖（每場labels與candidates都不同，動態渲染）
    let naspitHtml = '';
    if (a.type === 'naspit' && a.naspit_scores) {
      const chartId = 'naspit-radar-' + a.id;
      // 每場的6個指標名（從文章資料取，不寫死）
      const labels = a.naspit_dimensions_labels && a.naspit_dimensions_labels.length
        ? a.naspit_dimensions_labels
        : Object.keys(Object.values(a.naspit_scores)[0] || {});
      // 每場的4個對象（從scores的key取，不寫死AI品牌）
      const candidateNames = a.naspit_candidates && a.naspit_candidates.length
        ? a.naspit_candidates
        : Object.keys(a.naspit_scores);
      const palette = [
        { border: '#A03020', bg: 'rgba(160,48,32,0.10)' },
        { border: '#1D9E75', bg: 'rgba(29,158,117,0.10)' },
        { border: '#378ADD', bg: 'rgba(55,138,221,0.10)' },
        { border: '#8B6F47', bg: 'rgba(139,111,71,0.10)' },
      ];
      const datasets = candidateNames.map((name, i) => {
        const s = a.naspit_scores[name] || {};
        const color = palette[i % palette.length];
        return {
          label: name,
          data: labels.map(l => s[l] || 0),
          borderColor: color.border,
          backgroundColor: color.bg,
          borderWidth: 2,
          pointRadius: 3,
        };
      });
      const legendHtml = candidateNames.map((name, i) => {
        const color = palette[i % palette.length];
        return '<span style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-soft)">'
          + '<span style="width:10px;height:10px;border-radius:2px;background:' + color.border + ';display:inline-block"></span>'
          + esc(name) + '</span>';
      }).join('');

      const introHtml = a.naspit_intro
        ? '<div class="naspit-intro" style="font-size:0.92rem;color:var(--ink-soft);font-style:italic;margin:0.8rem 0 1.2rem;border-left:2px solid var(--accent);padding-left:1rem">' + esc(a.naspit_intro) + '</div>'
        : '';

      naspitHtml = '<div class="naspit-block">'
        + '<div class="naspit-meta">第' + (a.naspit_round||'?') + '場 · 裁判：' + esc(a.persona) + '</div>'
        + '<div class="naspit-topic">本場主題：' + esc(a.naspit_topic||'') + '</div>'
        + introHtml
        + '<div style="position:relative;width:100%;max-width:480px;height:340px;margin:1.5rem auto 0">'
        +   '<canvas id="' + chartId + '" role="img" aria-label="納斯達坑雷達圖"></canvas>'
        + '</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:10px">' + legendHtml + '</div>'
        + '</div>';

      setTimeout(function() {
        if (typeof Chart === 'undefined') return;
        const ctx = document.getElementById(chartId);
        if (!ctx) return;
        new Chart(ctx, {
          type: 'radar',
          data: { labels: labels, datasets: datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: { r: {
              min: 0, max: 10, ticks: { stepSize: 2, font: { size: 11 }, color: "#8a8378", backdropColor: "transparent" },
              grid: { color: "rgba(0,0,0,0.08)" }, angleLines: { color: "rgba(0,0,0,0.08)" },
              pointLabels: { font: { size: 11 }, color: "#555" }
            }},
            plugins: { legend: { display: false } }
          }
        });
      }, 100);
    }

    $('view-article').innerHTML = ''
      + '<button class="back-btn" onclick="window.BT.goBackFromArticle()">返回</button>'
      + '<article class="article-full">'
      +   '<div class="article-full-meta">'
      +     '<span><span class="persona-name">' + esc(a.persona) + '</span> · 版主 · <span class="type-tag">' + esc(typeLabel(a.type)) + '</span></span>'
      +     '<span>' + esc(a.timestamp) + '</span>'
      +   '</div>'
      +   '<h1 class="title">' + esc(a.title) + '</h1>'
      +   naspitHtml
      +   '<div class="content">' + esc(a.content) + '</div>'
      +   sourceHtml
      +   commentsHtml
      + '</article>';
  }

  // ============= 路由 =============
  function showView(viewId) {
    ['view-home', 'view-category', 'view-article'].forEach(id => {
      const el = $(id);
      if (el) el.hidden = (id !== viewId);
    });
    const v = $(viewId);
    if (v) {
      v.style.animation = 'none';
      void v.offsetHeight;
      v.style.animation = '';
    }
    window.scrollTo(0, 0);
  }

  function goHome() { location.hash = ''; }

  function goBackFromArticle() {
    if (currentCat) {
      location.hash = '#/cat/' + currentCat;
    } else if (history.length > 1) {
      history.back();
    } else {
      location.hash = '';
    }
  }

  function route() {
    const hash = location.hash || '';
    if (hash === '' || hash === '#' || hash === '#/') {
      currentCat = null;
      renderHome();
      showView('view-home');
    } else if (hash.indexOf('#/cat/') === 0) {
      const key = hash.split('/')[2];
      renderCategory(key);
      showView('view-category');
    } else if (hash.indexOf('#/article/') === 0) {
      const id = hash.split('/')[2];
      renderArticle(id);
      showView('view-article');
    } else {
      location.hash = '';
    }
  }

  window.BT = { goHome: goHome, goBackFromArticle: goBackFromArticle };
  window.addEventListener('hashchange', route);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', route);
  } else {
    route();
  }

  // ============= 防複製：複製時自動加浮水印（可用 Ctrl+Shift+U 解鎖）=============
  let copyUnlocked = false;
  
  // 鍵盤快捷鍵：Ctrl+Shift+U 切換解鎖狀態
  document.addEventListener('keydown', function (e) {
    if (e.ctrlKey && e.shiftKey && (e.key === 'U' || e.key === 'u')) {
      e.preventDefault();
      copyUnlocked = !copyUnlocked;
      if (copyUnlocked) {
        document.body.style.userSelect = 'text';
        document.body.style.webkitUserSelect = 'text';
        document.body.style.msUserSelect = 'text';
        showLockToast('解鎖：可正常複製');
      } else {
        document.body.style.userSelect = '';
        document.body.style.webkitUserSelect = '';
        document.body.style.msUserSelect = '';
        showLockToast('已上鎖：複製會加浮水印');
      }
    }
  });

  // 顯示一個淡入淡出的小提示
  function showLockToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);'
      + 'background:rgba(26,26,26,0.92);color:#F4F1EA;padding:10px 22px;'
      + 'border-radius:999px;font-size:0.9rem;letter-spacing:0.06em;z-index:9999;'
      + 'transition:opacity 0.4s;font-family:var(--serif-tc);';
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; }, 1500);
    setTimeout(() => { t.remove(); }, 2000);
  }

  document.addEventListener('copy', function (e) {
    // 解鎖狀態：不加浮水印，正常複製
    if (copyUnlocked) return;
    
    const sel = window.getSelection ? window.getSelection().toString() : '';
    if (!sel) return;
    const watermark = '\n\n——\n來源：' + SITE_NAME + ' · ' + SITE_URL;
    const stamped = sel + watermark;
    if (e.clipboardData) {
      e.clipboardData.setData('text/plain', stamped);
      e.preventDefault();
    }
  });

  // 阻擋右鍵選單（防右鍵複製）
  document.addEventListener('contextmenu', function (e) {
    // 解鎖狀態：允許右鍵
    if (copyUnlocked) return;
    
    const tag = (e.target && e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;
    e.preventDefault();
  });
})();
</script>
</body>
